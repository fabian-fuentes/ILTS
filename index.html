<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)">
    <meta name="description" content="ILTS — Free, open-source Duolingo English Test prep app. Runs entirely in your browser. Vocabulary, reading, listening, writing, and mock tests with estimated DET scoring.">
    <meta name="color-scheme" content="dark light">

    <title>ILTS · DET Prep — Duolingo English Test Study App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Space+Grotesk:wght@500;600;700&display=swap">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>">
</head>
<body>
    <div class="aurora-bg" aria-hidden="true"><span></span></div>

    <header class="app-header">
        <a href="#/dashboard" class="logo" aria-label="ILTS inicio">🦉 ILTS</a>
        <div class="header-right">
            <nav class="main-nav" aria-label="Navegación principal">
                <a href="#/dashboard">Inicio</a>
                <a href="#/vocabulary">Vocab</a>
                <a href="#/mock-test">Simulacro</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
            </button>
        </div>
    </header>

    <main id="app" class="app-main">
        <div class="loader">Cargando…</div>
    </main>

    <footer class="app-footer">
        <small>App de estudio para el Duolingo English Test · Progreso guardado localmente en tu navegador · <a href="https://github.com/fabian-fuentes/ilts">GitHub</a></small>
    </footer>

    <script type="module" src="js/app.js"></script>

</html>
